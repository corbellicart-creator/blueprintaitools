<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint AI Tools — The Corbellic Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#D4A017;--ag:rgba(212,160,23,.15);--ab:rgba(212,160,23,.25);
  --bg:#0B0B0B;--card:#141414;--cb:#222;--text:#F5F0E8;--dim:#9E9789;--faint:#4a4740;--meta:#1a1a1a;
}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4;z-index:100}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sb{width:290px;background:#0e0e0e;border-right:1px solid var(--cb);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10;transition:transform .3s}
.sb::-webkit-scrollbar{width:4px}
.sb::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.sbh{padding:24px 20px 16px;border-bottom:1px solid var(--cb)}
.sbh h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--accent)}
.sbh p{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);margin-top:6px}
.mg{border-bottom:1px solid #1a1a1a}
.mh{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;transition:background .15s;font-size:13px;font-weight:600;color:var(--dim)}
.mh:hover,.mh.act{background:#1a1a1a;color:var(--text)}
.mh .ar{margin-left:auto;font-size:9px;transition:transform .2s}
.mh.act .ar{transform:rotate(90deg)}
.mh .ic{font-size:16px}
.mp{display:none;background:#111}
.mp.op{display:block}
.pb{display:block;width:100%;text-align:left;padding:9px 18px 9px 44px;border:none;background:none;color:var(--faint);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;line-height:1.4}
.pb:hover{color:var(--dim);background:#161616}
.pb.act{color:var(--accent);background:#1a1714;border-left:2px solid var(--accent)}

/* Main */
.mn{margin-left:290px;flex:1;padding:32px 40px;max-width:860px}

/* Mobile */
.mt{display:none;position:fixed;top:10px;left:10px;z-index:20;background:var(--card);border:1px solid var(--cb);color:var(--text);padding:10px 14px;border-radius:6px;font-size:18px;cursor:pointer}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9}
@media(max-width:768px){
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  .mn{margin-left:0;padding:20px 16px;padding-top:56px}
  .mt{display:block}
  .ov.sh{display:block}
}

/* Welcome */
.wl{text-align:center;padding:60px 20px}
.wl h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,40px);font-weight:400;margin-bottom:14px}
.wl p{font-size:15px;color:var(--dim);line-height:1.6;max-width:480px;margin:0 auto 28px}
.sr{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.st{background:var(--card);border:1px solid var(--cb);border-radius:8px;padding:14px 22px;text-align:center}
.st .n{font-size:26px;font-family:'Playfair Display',serif;color:var(--accent)}
.st .l{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-top:4px}

/* Tool */
.ts{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bc{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;font-weight:600}
.tt{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,32px);font-weight:400;margin-bottom:24px;line-height:1.3}
.fg{margin-bottom:18px}
.fl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;font-weight:700}
.fh{font-size:12px;color:var(--faint);margin-bottom:6px;font-style:italic}
textarea.fi2{width:100%;min-height:90px;background:var(--card);border:1px solid var(--cb);border-radius:6px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;line-height:1.6;padding:12px 14px;resize:vertical;outline:none;transition:border-color .2s,box-shadow .2s}
textarea.fi2:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ag)}
textarea.fi2::placeholder{color:#3a3a3a}
.bp{background:var(--accent);color:var(--bg);border:none;padding:14px 32px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:4px;cursor:pointer;transition:all .2s;box-shadow:0 2px 12px var(--ag)}
.bp:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,160,23,.25)}
.bp:disabled{opacity:.25;cursor:default;box-shadow:none}
.br{display:flex;justify-content:flex-end;margin-top:24px}

/* No fields */
.nf{background:var(--card);border:1px solid var(--cb);border-radius:8px;padding:20px;margin-bottom:20px}
.nf p{color:var(--dim);line-height:1.6;font-size:14px}
.pp{background:var(--meta);border-radius:6px;padding:16px;margin-top:14px;font-size:13px;line-height:1.7;color:var(--dim);white-space:pre-wrap;max-height:280px;overflow-y:auto;border:1px solid var(--cb)}

/* Loading */
.lw{text-align:center;padding:60px 20px}
@keyframes sp{to{transform:rotate(360deg)}}
.spin{width:40px;height:40px;border:3px solid #222;border-top-color:var(--accent);border-radius:50%;margin:0 auto 20px;animation:sp .8s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pls{animation:pulse 1.5s ease-in-out infinite}

/* Results */
.rc{background:var(--card);border:1px solid var(--cb);border-radius:8px;padding:26px 22px;margin-bottom:20px}
.rt{font-size:14px;line-height:1.8;color:var(--dim);white-space:pre-wrap;word-wrap:break-word}
.cb2{background:var(--meta);border:1px solid var(--cb);color:var(--dim);padding:8px 18px;font-size:11px;font-family:'DM Sans',sans-serif;letter-spacing:1px;text-transform:uppercase;border-radius:4px;cursor:pointer;transition:all .15s;display:inline-block}
.cb2:hover{background:#252525;color:var(--text)}
.btns{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
</style>
</head>
<body>
<button class="mt" onclick="tSb()">☰</button>
<div class="ov" id="ov" onclick="tSb()"></div>
<div class="app">
<nav class="sb" id="sb"></nav>
<div class="mn" id="mn"></div>
</div>
<script>
const M={"1": {"name": "The School Setup", "icon": "🏗️", "prompts": [{"title": "Your Business Foundation", "prompt": "I want to build an online community business around [YOUR PASSION/SKILL]. Here is my background: [DESCRIBE YOUR EXPERIENCE, EVEN IF MINIMAL]. My target audience is [WHO YOU WANT TO HELP]. The result I want to help them achieve is [SPECIFIC OUTCOME]. Based on this, help me clarify my business idea by giving me: 1) A one-sentence description of my community, 2) Three reasons someone would join, 3) What makes me qualified to teach this even if I am still learning, and 4) A suggested name for my community.", "fields": ["YOUR PASSION/SKILL", "DESCRIBE YOUR EXPERIENCE, EVEN IF MINIMAL", "WHO YOU WANT TO HELP", "SPECIFIC OUTCOME"], "hints": {"YOUR PASSION/SKILL": "e.g. woodworking, cooking, personal finance, dog training...", "DESCRIBE YOUR EXPERIENCE, EVEN IF MINIMAL": "e.g. 10 years in retail management, sold 500+ items on Etsy...", "WHO YOU WANT TO HELP": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "SPECIFIC OUTCOME": "e.g. earn $2,000/month from their passion, get their first 100 sales..."}}, {"title": "Community Description", "prompt": "Write a Skool community description for my group called [NAME]. I help [TARGET AUDIENCE] achieve [SPECIFIC RESULT]. My background is [YOUR EXPERIENCE/CREDIBILITY]. The tone should be direct, confident, and motivating — not salesy or corporate. Include: a hook that grabs attention, what members will learn, who this is for, and a call to action to join. Keep it under 200 words.", "fields": ["NAME", "TARGET AUDIENCE", "SPECIFIC RESULT", "YOUR EXPERIENCE/CREDIBILITY"], "hints": {"NAME": "Your name or brand name", "TARGET AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "SPECIFIC RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "YOUR EXPERIENCE/CREDIBILITY": "e.g. 10 years in retail management, sold 500+ items on Etsy..."}}, {"title": "Category Descriptions", "prompt": "Write short descriptions for each of the following Skool community categories. Each description should be one to two sentences, friendly and clear, telling members exactly what to post in that category: 1) Welcome and Introductions, 2) Wins and Results, 3) Questions and Support, 4) Resources and Tools, 5) General Discussion. My community is about [YOUR NICHE].", "fields": ["YOUR NICHE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}, {"title": "About Page Draft", "prompt": "Write an about page for my Skool community using this framework. My community is called [NAME] and I help [AUDIENCE] achieve [RESULT]. Here is my story: [SHARE YOUR JOURNEY — where you started, what you struggled with, what you figured out, what results you got]. Here are my proof points: [LIST ANY NUMBERS, RESULTS, OR CREDENTIALS]. When someone joins, they get: [LIST WHAT MEMBERS RECEIVE]. Write this in a direct, conversational, motivating tone. Use short paragraphs. Open with a hook about the reader's pain point, not about me. End with a clear call to action.", "fields": ["NAME", "AUDIENCE", "RESULT", "LIST ANY NUMBERS, RESULTS, OR CREDENTIALS", "LIST WHAT MEMBERS RECEIVE"], "hints": {"NAME": "Your name or brand name", "AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "LIST ANY NUMBERS, RESULTS, OR CREDENTIALS": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "LIST WHAT MEMBERS RECEIVE": ""}}, {"title": "Refining Your About Page", "prompt": "Here is my current about page draft: [PASTE DRAFT]. Make it more personal and authentic. Remove anything that sounds generic or corporate. Add more of my personality. Make the proof section more impactful by highlighting the most impressive numbers. Tighten the call to action so it creates urgency without being pushy.", "fields": ["PASTE DRAFT"], "hints": {"PASTE DRAFT": ""}}, {"title": "Full Classroom Map", "prompt": "I am building an online course inside a Skool community that teaches [YOUR AUDIENCE] how to [ACHIEVE SPECIFIC RESULT]. My own experience is [YOUR BACKGROUND]. I want to create a classroom with 8 to 12 modules, and each module should have 3 to 5 lessons. Map out the entire classroom structure for me with module titles and lesson titles under each one. Organize it in a logical order that takes someone from complete beginner to running a profitable business. Make the titles clear and specific — no vague or generic names.", "fields": ["YOUR AUDIENCE", "ACHIEVE SPECIFIC RESULT", "YOUR BACKGROUND"], "hints": {"YOUR AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "ACHIEVE SPECIFIC RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "YOUR BACKGROUND": "e.g. 10 years in retail management, sold 500+ items on Etsy..."}}, {"title": "Individual Lesson Outlines", "prompt": "I need to write a lesson for my online course. The module is [MODULE NAME] and the lesson is [LESSON TITLE]. My audience is [WHO THEY ARE]. Write a detailed lesson outline that includes: 1) The main concept and why it matters, 2) A step-by-step breakdown they can follow, 3) A real-world example or story, 4) An AI prompt they can use to apply this to their own business, and 5) A specific action step they need to complete before moving to the next lesson. Write it in a direct, coaching tone — like I am talking to them one on one.", "fields": ["MODULE NAME", "LESSON TITLE", "WHO THEY ARE"], "hints": {"MODULE NAME": "Your name or brand name", "LESSON TITLE": "Enter the title", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Welcome Post", "prompt": "Write a welcome post for my Skool community called [NAME]. This post will be pinned at the top and is the first thing new members see. The tone should be warm, energetic, and direct. The post should: 1) Congratulate them on joining and make them feel like they made a smart decision, 2) Briefly explain what this community is about and what they can expect, 3) Tell them the three things to do right now (introduce themselves with a specific question, check out the classroom, and set a goal), 4) End with an encouraging statement about their future. Keep it under 300 words. Make it feel personal, not corporate.", "fields": ["NAME"], "hints": {"NAME": "Your name or brand name"}}, {"title": "Introduction Template", "prompt": "Create an introduction template for new members of my [NICHE] community. Give them a fun, easy format to follow that includes: their name, where they are from, what their passion or skill is, where they are at right now in their journey, and one goal they want to achieve in the next 90 days. Make the format feel casual and fun, not like a job application. Add one unexpected or creative question that sparks engagement from other members.", "fields": ["NICHE"], "hints": {"NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}, {"title": "Welcome Sequence Emails", "prompt": "Write a 4-message welcome sequence for new members of my community. Space them out over 7 days. Message 1 (Day 1): Welcome and what to do first. Message 2 (Day 3): Point them to the most valuable resource. Message 3 (Day 5): Share a member success story framework. Message 4 (Day 7): Invite to engage deeper. Each message should be 50 to 100 words, feel personal, and have one clear call to action. My community helps [AUDIENCE] achieve [RESULT].", "fields": ["AUDIENCE", "RESULT"], "hints": {"AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales..."}}, {"title": "30-Day Content Calendar", "prompt": "Create a 30-day content calendar for me to promote my online community about [YOUR NICHE]. I post on [PLATFORMS YOU USE]. For each day, give me: 1) The content topic, 2) A one-sentence hook that grabs attention, 3) The platform to post it on, and 4) The call to action pointing to my community. Mix up the content types: educational posts, personal stories, results and proof, myth-busting, and motivational content. Make the hooks scroll-stopping and the topics relevant to [YOUR TARGET AUDIENCE].", "fields": ["YOUR NICHE", "PLATFORMS YOU USE", "YOUR TARGET AUDIENCE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "PLATFORMS YOU USE": "e.g. YouTube, TikTok, Facebook, Instagram...", "YOUR TARGET AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Short-Form Video Script", "prompt": "Write a 60-second video script for [PLATFORM] about [TOPIC]. My audience is [WHO THEY ARE]. Start with a hook in the first three seconds that stops people from scrolling. Deliver one valuable insight or tip in the middle. End with a call to action to join my free community at [LINK/NAME]. Keep the language conversational and direct. Do not use any corporate or formal language.", "fields": ["PLATFORM", "TOPIC", "WHO THEY ARE", "LINK/NAME"], "hints": {"PLATFORM": "e.g. YouTube, TikTok, Facebook, Instagram...", "TOPIC": "Describe the specific topic...", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "LINK/NAME": "Your name or brand name"}}, {"title": "Personal Outreach Messages", "prompt": "Write 3 different personal outreach messages I can send to people I know to invite them to my community. One for a close friend, one for a social media follower who has engaged with my content before, and one for someone I have not talked to in a while. My community helps [AUDIENCE] achieve [RESULT]. The messages should feel genuine, not salesy. Each should be under 75 words and include a soft call to action.", "fields": ["AUDIENCE", "RESULT"], "hints": {"AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales..."}}, {"title": "Pricing Strategy", "prompt": "Help me set the right price for my paid community. I teach [AUDIENCE] how to [RESULT]. The realistic monthly income someone could expect after implementing my system for 3 months is [AMOUNT]. I currently have [NUMBER] free members and [NUMBER] paid members. Based on my niche, my audience's likely income level, and the value I deliver, recommend a monthly price point and explain the psychology behind why it works. Also suggest whether I should offer annual pricing and what discount to give.", "fields": ["AUDIENCE", "RESULT", "AMOUNT", "NUMBER"], "hints": {"AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "AMOUNT": "e.g. 47, 77, 97...", "NUMBER": "Enter a number"}}, {"title": "Content Split Between Free and Paid", "prompt": "I run a community about [YOUR NICHE]. Help me decide what content to put in my free tier vs. my paid tier. For my free tier, list the topics, content types, and level of detail I should provide to attract members and build trust. For my paid tier, list the exclusive content, tools, templates, and access levels that justify a $[PRICE]/month subscription. Make sure the free content is valuable enough that people stick around, but the paid content is compelling enough that upgrading feels like an obvious decision.", "fields": ["YOUR NICHE", "PRICE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "PRICE": "e.g. 47, 77, 97..."}}, {"title": "Weekly Accountability Check-In", "prompt": "I am building an online community business. Here is what I accomplished this week: [LIST WHAT YOU DID]. Here is what I struggled with: [LIST YOUR CHALLENGES]. My current member count is [NUMBER]. My goal for next week is [YOUR GOAL]. Based on my progress, what should I focus on next week to keep growing? Give me 3 specific priorities and help me troubleshoot the challenges I listed.", "fields": ["LIST WHAT YOU DID", "LIST YOUR CHALLENGES", "NUMBER", "YOUR GOAL"], "hints": {"LIST WHAT YOU DID": "", "LIST YOUR CHALLENGES": "", "NUMBER": "Enter a number", "YOUR GOAL": ""}}, {"title": "Troubleshooting Low Engagement", "prompt": "My community has [NUMBER] members but engagement is low. Only [NUMBER] people are posting or commenting. My community is about [NICHE]. Here is what I have been posting: [DESCRIBE YOUR RECENT POSTS]. Help me figure out why engagement is low and give me 5 specific post ideas that will spark conversations and get people interacting.", "fields": ["NUMBER", "NICHE", "DESCRIBE YOUR RECENT POSTS"], "hints": {"NUMBER": "Enter a number", "NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "DESCRIBE YOUR RECENT POSTS": ""}}]}, "2": {"name": "Supplies & Software", "icon": "🛠️", "prompts": [{"title": "Budget Equipment Plan", "prompt": "I am starting an online business in [YOUR NICHE] and I have a budget of $[AMOUNT] for equipment and tools. I currently own: [LIST WHAT YOU ALREADY HAVE — phone model, computer, etc.]. Based on my niche and what I will need to create content and run my business, what should I buy first, second, and third? Prioritize the items that will have the biggest impact on getting started and making money. Give me specific product recommendations with approximate prices.", "fields": ["YOUR NICHE", "AMOUNT"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "AMOUNT": "e.g. 47, 77, 97..."}}, {"title": "Getting Started With AI Tools", "prompt": "I am building an online business around [YOUR NICHE]. I have access to [LIST WHICH AI TOOLS YOU HAVE]. Help me understand how to use each tool effectively. For each one, give me: 1) The best types of tasks to use it for, 2) One example prompt I can try right now related to my niche, and 3) Tips for getting the best results from it. Also tell me which tool to prioritize if I can only afford one paid subscription right now.", "fields": ["YOUR NICHE", "LIST WHICH AI TOOLS YOU HAVE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "LIST WHICH AI TOOLS YOU HAVE": ""}}, {"title": "Building Your AI Workflow", "prompt": "I want to create a daily workflow for using AI in my business. My business involves [DESCRIBE YOUR BUSINESS]. My daily tasks include [LIST YOUR TYPICAL TASKS — content creation, community management, emails, etc.]. Map out a daily routine showing which AI tool to use for each task, what prompts to run, and in what order. Make this practical and time-efficient so I can get maximum output in minimum time.", "fields": ["DESCRIBE YOUR BUSINESS"], "hints": {"DESCRIBE YOUR BUSINESS": ""}}, {"title": "Social Media Bio", "prompt": "Write a social media bio for my [PLATFORM] account. I help [AUDIENCE] achieve [RESULT]. My credibility includes [YOUR PROOF POINTS — numbers, experience, results]. The bio needs to be under [CHARACTER LIMIT: Twitter is 160, Instagram is 150] characters. Make it direct, confident, and include a call to action pointing to my community. Give me 5 options to choose from.", "fields": ["PLATFORM", "AUDIENCE", "RESULT"], "hints": {"PLATFORM": "e.g. YouTube, TikTok, Facebook, Instagram...", "AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales..."}}, {"title": "Platform Priority Strategy", "prompt": "I am building an online community business in [YOUR NICHE]. My target audience is [DESCRIBE THEM — age, interests, where they spend time online]. I have limited time and cannot be on every platform. Based on my niche and audience, rank these platforms in order of priority for me: YouTube, Facebook, Instagram, X/Twitter, TikTok, LinkedIn. For each one, tell me whether I should use it actively, passively, or skip it entirely, and explain why. Also tell me which ONE platform I should master first before expanding.", "fields": ["YOUR NICHE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}, {"title": "Learning Video Editing", "prompt": "I am brand new to video editing and I am using [YOUR SOFTWARE — PowerDirector, iMovie, DaVinci Resolve, etc.]. I need to edit YouTube videos for my [NICHE] business. Walk me through the basics I need to learn first. Give me a step-by-step learning plan for my first week of editing, starting with the absolute basics and building up to being able to produce a clean, professional-looking video. Include specific features to learn, keyboard shortcuts that save time, and common beginner mistakes to avoid.", "fields": ["NICHE"], "hints": {"NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}, {"title": "Thumbnail and Design Ideas", "prompt": "I need to create a YouTube thumbnail for a video titled [YOUR VIDEO TITLE]. My niche is [YOUR NICHE] and my target audience is [AUDIENCE]. Give me 5 thumbnail concepts including: what text to put on the thumbnail (keep it to 4-6 words max), what emotion my facial expression should show, what colors to use for maximum contrast, and any visual elements to include. Make these thumbnails designed to get clicks from [YOUR TARGET VIEWER].", "fields": ["YOUR VIDEO TITLE", "YOUR NICHE", "AUDIENCE", "YOUR TARGET VIEWER"], "hints": {"YOUR VIDEO TITLE": "Enter the title", "YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "YOUR TARGET VIEWER": ""}}, {"title": "Presentation Outline", "prompt": "Create a PowerPoint presentation outline for a YouTube video about [TOPIC]. My audience is [WHO THEY ARE]. The video should be [LENGTH] minutes long. Give me the slide titles, bullet points for each slide, and suggestions for what visuals or data to include on each slide. Make the content educational and actionable, with a call to action on the final slide pointing to my community.", "fields": ["TOPIC", "WHO THEY ARE", "LENGTH"], "hints": {"TOPIC": "Describe the specific topic...", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "LENGTH": ""}}, {"title": "Welcome Email", "prompt": "Write a welcome email for new subscribers to my email list. My business is about [YOUR NICHE] and I help [AUDIENCE] achieve [RESULT]. This is the first email they receive after signing up. The tone should be warm, direct, and make them feel like they made a great decision. Include: a thank you, what they can expect from my emails, one quick valuable tip or insight they can use immediately, and a call to action to join my free community. Keep it under 300 words.", "fields": ["YOUR NICHE", "AUDIENCE", "RESULT"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales..."}}, {"title": "Email Nurture Sequence", "prompt": "Create a 7-email nurture sequence for my email list. My business helps [AUDIENCE] achieve [RESULT]. Space the emails over 14 days. Each email should: 1) Have an attention-grabbing subject line, 2) Provide genuine value or an insight, 3) Include a story or example from my experience, and 4) End with a soft call to action. The sequence should gradually build trust and lead toward joining my paid community at $[PRICE]/month. Give me the subject line, the main topic, and a brief outline for each email.", "fields": ["AUDIENCE", "RESULT", "PRICE"], "hints": {"AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "PRICE": "e.g. 47, 77, 97..."}}, {"title": "Automation Workflow", "prompt": "I run an online community business using Skool, Mailchimp, and Zapier. Help me map out all the automations I should set up to save time and never miss a lead. For each automation, tell me: 1) The trigger (what starts it), 2) The action (what happens automatically), 3) Which apps are involved, and 4) How to set it up in Zapier step by step. Focus on automations that capture leads, nurture them, and drive them toward my paid community.", "fields": [], "hints": {}}, {"title": "Live Stream Content Plan", "prompt": "I host weekly live streams for my online community about [YOUR NICHE]. Help me plan my next 4 live streams. For each one, give me: 1) A compelling title that makes people want to show up, 2) An outline of what I will cover, 3) Three questions I should ask the audience to drive engagement, and 4) A call to action for the end of the stream. Mix the formats between Q&A, teaching, hot takes, and member spotlight sessions.", "fields": ["YOUR NICHE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}, {"title": "Personalized Budget Plan", "prompt": "I am building an online business in [YOUR NICHE] with a monthly budget of $[AMOUNT] for tools and software. Here is what I already have: [LIST YOUR CURRENT TOOLS]. Here is what I still need: [LIST WHAT YOU ARE MISSING]. Create a 3-month phased spending plan that tells me exactly what to buy each month, what to use for free, and when to upgrade. Prioritize tools that directly help me make money first, and nice-to-have tools last. Include the estimated monthly cost at each phase.", "fields": ["YOUR NICHE", "AMOUNT", "LIST YOUR CURRENT TOOLS", "LIST WHAT YOU ARE MISSING"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "AMOUNT": "e.g. 47, 77, 97...", "LIST YOUR CURRENT TOOLS": "", "LIST WHAT YOU ARE MISSING": ""}}, {"title": "Tool Setup Checklist", "prompt": "I need to set up the following tools for my online business today: [LIST THE TOOLS YOU ARE SETTING UP]. For each tool, walk me through the exact setup process step by step. Tell me what settings to configure, what to skip, and any tips for getting the most out of each tool from day one. Keep the instructions simple and practical.", "fields": ["LIST THE TOOLS YOU ARE SETTING UP"], "hints": {"LIST THE TOOLS YOU ARE SETTING UP": ""}}]}, "3": {"name": "YouTube", "icon": "🎬", "prompts": [{"title": "YouTube Content Strategy", "prompt": "I am building a YouTube channel to drive traffic to my Skool community about [YOUR NICHE]. My target audience is [DESCRIBE THEM]. The result I help them achieve is [SPECIFIC OUTCOME]. Give me a YouTube content strategy that includes: 1) The types of videos I should make (educational, how-to, reaction, storytelling, etc.), 2) How to position every video as a funnel to my community, 3) How often I should post, and 4) The 10 best video topics to start with based on what my audience is searching for. Focus on topics that attract buyers, not just viewers.", "fields": ["YOUR NICHE", "DESCRIBE THEM", "SPECIFIC OUTCOME"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "DESCRIBE THEM": "", "SPECIFIC OUTCOME": "e.g. earn $2,000/month from their passion, get their first 100 sales..."}}, {"title": "Channel Banner Text", "prompt": "I am creating a YouTube channel banner for my channel called [CHANNEL NAME]. My channel teaches [YOUR NICHE] to [YOUR AUDIENCE]. Give me 5 options for banner text that include: a tagline that communicates my value in under 10 words, and a call to action. The text needs to be short enough to read at a glance. Make it direct, confident, and appealing to [TARGET AUDIENCE].", "fields": ["CHANNEL NAME", "YOUR NICHE", "YOUR AUDIENCE", "TARGET AUDIENCE"], "hints": {"CHANNEL NAME": "e.g. The Hustle Kitchen, FitLife with Sarah...", "YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "YOUR AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "TARGET AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Channel Description", "prompt": "Write a YouTube channel description for my channel called [NAME]. I create content about [YOUR NICHE] for [TARGET AUDIENCE]. My background is [YOUR EXPERIENCE AND CREDIBILITY]. Include relevant keywords that people in my niche would search for on YouTube. The description should be 150 to 300 words, written in first person, and include a call to action to join my free community with a placeholder for the link. Make it sound personal and authentic, not corporate.", "fields": ["NAME", "YOUR NICHE", "TARGET AUDIENCE", "YOUR EXPERIENCE AND CREDIBILITY"], "hints": {"NAME": "Your name or brand name", "YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "TARGET AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "YOUR EXPERIENCE AND CREDIBILITY": "e.g. 10 years in retail management, sold 500+ items on Etsy..."}}, {"title": "Channel Keywords", "prompt": "Generate 15 YouTube channel keywords for a channel about [YOUR NICHE]. My target audience is [DESCRIBE THEM]. Include a mix of broad niche terms, specific topic phrases, and audience-related terms. These keywords help YouTube's algorithm understand and categorize my channel. Format them as a comma-separated list I can paste directly into YouTube Studio.", "fields": ["YOUR NICHE", "DESCRIBE THEM"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "DESCRIBE THEM": ""}}, {"title": "Introduction Video Script", "prompt": "Write a script for my first YouTube introduction video. My name is [NAME]. My channel is called [CHANNEL NAME]. I teach [AUDIENCE] how to [RESULT]. My background is [YOUR STORY AND EXPERIENCE]. What makes me different from other people in my niche is [YOUR UNIQUE DIFFERENTIATOR]. The video should be 2 to 4 minutes long when read at a natural pace. Write it in a conversational, direct tone like I am talking to one person across a table. Include a call to action to subscribe and join my free community. Do not make it sound scripted or corporate. Make it sound like me.", "fields": ["NAME", "CHANNEL NAME", "AUDIENCE", "RESULT", "YOUR STORY AND EXPERIENCE", "YOUR UNIQUE DIFFERENTIATOR"], "hints": {"NAME": "Your name or brand name", "CHANNEL NAME": "e.g. The Hustle Kitchen, FitLife with Sarah...", "AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "YOUR STORY AND EXPERIENCE": "e.g. 10 years in retail management, sold 500+ items on Etsy...", "YOUR UNIQUE DIFFERENTIATOR": ""}}, {"title": "Overcoming Camera Anxiety", "prompt": "I am about to record my first YouTube video and I am feeling anxious and self-conscious. Give me a practical pre-recording routine I can follow to calm my nerves and show up confidently on camera. Include breathing exercises, mindset reframes, and practical tips for looking and sounding natural. Also give me 5 affirmations I can say to myself before hitting record that will help me push through the discomfort.", "fields": [], "hints": {}}, {"title": "SEO-Optimized File Name", "prompt": "I just created a YouTube video about [DESCRIBE YOUR VIDEO TOPIC]. Generate 5 options for an SEO-optimized file name I should use when exporting the video. The file name should include keywords my target audience would search for on YouTube. Format each option as a lowercase, hyphen-separated file name ending in .mp4.", "fields": ["DESCRIBE YOUR VIDEO TOPIC"], "hints": {"DESCRIBE YOUR VIDEO TOPIC": "Describe the specific topic..."}}, {"title": "Grok Thumbnail Image", "prompt": "Generate a YouTube thumbnail background image for a video about [YOUR VIDEO TOPIC]. The image should be eye-catching and use [COLORS] as the dominant colors. Include visual elements related to [DESCRIBE WHAT YOU WANT TO SEE — money, growth charts, a computer, a whiteboard, etc.]. Make it bold and high-contrast so text can be overlaid on top. The mood should be [ENERGETIC/PROFESSIONAL/INSPIRING/etc.].", "fields": ["YOUR VIDEO TOPIC", "COLORS"], "hints": {"YOUR VIDEO TOPIC": "Describe the specific topic...", "COLORS": ""}}, {"title": "Thumbnail Text Ideas", "prompt": "I need thumbnail text for a YouTube video titled [YOUR VIDEO TITLE]. My target audience is [WHO THEY ARE]. Give me 10 options for thumbnail text that are 4 to 6 words max, create curiosity, and would make someone stop scrolling and click. Make the text bold, direct, and impossible to ignore. Include options that use numbers, questions, and bold statements.", "fields": ["YOUR VIDEO TITLE", "WHO THEY ARE"], "hints": {"YOUR VIDEO TITLE": "Enter the title", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Video Title Options", "prompt": "Generate 10 YouTube video title options for a video about [YOUR TOPIC]. My target audience is [WHO THEY ARE]. Each title should: 1) Include a searchable keyword phrase that my audience would type into YouTube, 2) Create curiosity or promise a specific result, 3) Be under 60 characters, and 4) Use power words that drive clicks (like \"secret,\" \"mistake,\" \"how I,\" \"step-by-step,\" numbers, etc.). Rank them from most likely to get clicks to least.", "fields": ["YOUR TOPIC", "WHO THEY ARE"], "hints": {"YOUR TOPIC": "Describe the specific topic...", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Video Description", "prompt": "Write a YouTube video description for my video titled [TITLE]. The video covers [SUMMARIZE THE CONTENT]. My target audience is [WHO THEY ARE]. My Skool community link is [LINK]. Include: 1) A hook and community link in the first two lines, 2) A keyword-rich summary of the video in 2-3 paragraphs, 3) Timestamps based on these sections: [LIST YOUR VIDEO SECTIONS WITH APPROXIMATE TIMES], 4) Links section with my community and social media placeholders, and 5) Three to five relevant hashtags. Use natural language but include keywords that my audience would search for.", "fields": ["TITLE", "SUMMARIZE THE CONTENT", "WHO THEY ARE", "LINK", "LIST YOUR VIDEO SECTIONS WITH APPROXIMATE TIMES"], "hints": {"TITLE": "Enter the title", "SUMMARIZE THE CONTENT": "", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "LINK": "Paste your URL here", "LIST YOUR VIDEO SECTIONS WITH APPROXIMATE TIMES": ""}}, {"title": "Video Tags", "prompt": "Generate 15 YouTube tags for a video titled [YOUR TITLE] about [YOUR TOPIC]. My niche is [YOUR NICHE] and my target audience is [WHO THEY ARE]. Include a mix of: 1) Broad high-volume search terms (1-2 words), 2) Medium specificity phrases (3-4 words), and 3) Long-tail specific phrases (5+ words) that my exact audience would search for. Also include any trending or seasonal terms related to this topic. Format them as a comma-separated list I can paste directly into YouTube Studio.", "fields": ["YOUR TITLE", "YOUR TOPIC", "YOUR NICHE", "WHO THEY ARE"], "hints": {"YOUR TITLE": "Enter the title", "YOUR TOPIC": "Describe the specific topic...", "YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Pinned Comment", "prompt": "Write a pinned YouTube comment for my video about [TOPIC]. The comment should feel natural and conversational, not salesy. It should: 1) Reference the video content briefly, 2) Tell viewers where to go for more in-depth help, 3) Include a call to action to join my free community at [LINK], and 4) Ask a question that encourages people to reply. Keep it under 100 words.", "fields": ["TOPIC", "LINK"], "hints": {"TOPIC": "Describe the specific topic...", "LINK": "Paste your URL here"}}, {"title": "Short-Form Captions", "prompt": "Write 5 different captions for a short-form video clip about [CLIP TOPIC]. Each caption should: 1) Hook the viewer in the first line, 2) Be under 150 characters for TikTok compatibility, 3) Include a call to action to join my free community or watch the full video, and 4) Include 3-5 relevant hashtags. Give me one caption each for YouTube Shorts, TikTok, Instagram Reels, and Facebook Reels, plus one generic option that works anywhere.", "fields": ["CLIP TOPIC"], "hints": {"CLIP TOPIC": "Describe the specific topic..."}}, {"title": "Weekly Video Topic Ideas", "prompt": "Generate 10 YouTube video topic ideas for my channel about [YOUR NICHE]. My audience is [WHO THEY ARE]. For each topic, give me: 1) The video title (SEO-optimized, under 60 characters), 2) A one-sentence hook for the first 5 seconds, 3) Three main points the video should cover, and 4) A call to action that connects to my Skool community. Mix formats: include how-to videos, list videos, story-based videos, and myth-busting videos. Prioritize topics with high search potential.", "fields": ["YOUR NICHE", "WHO THEY ARE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Analyzing Your YouTube Performance", "prompt": "I have been posting YouTube videos for [TIME PERIOD]. Here are my stats: [LIST YOUR TOP 5 VIDEOS WITH THEIR VIEW COUNTS, CLICK-THROUGH RATES, AND AVERAGE VIEW DURATION]. Here are my bottom 5 performing videos: [LIST THEM WITH THE SAME STATS]. Analyze the patterns. What do my top-performing videos have in common? What are my underperforming videos missing? Based on this data, what types of content should I focus on going forward, and what should I stop doing? Give me a specific content strategy for the next 30 days.", "fields": ["TIME PERIOD", "LIST THEM WITH THE SAME STATS"], "hints": {"TIME PERIOD": "", "LIST THEM WITH THE SAME STATS": ""}}]}, "4": {"name": "Meta Ads", "icon": "📣", "prompts": [{"title": "Ad Strategy Planning", "prompt": "I am planning to run Meta Ads to drive traffic to my free Skool community about [YOUR NICHE]. My target audience is [DESCRIBE THEM]. My goal is to get new free members for under $3 per lead. My daily budget is $33. Help me plan my ad strategy: 1) What type of campaign objective should I use? 2) What targeting should I start with? 3) How many ad variations should I test? 4) What metrics should I track to determine winners vs. losers? 5) What is a realistic cost per lead I should aim for in my niche?", "fields": ["YOUR NICHE", "DESCRIBE THEM"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "DESCRIBE THEM": ""}}, {"title": "Pixel Troubleshooting", "prompt": "I am trying to set up my Meta Pixel on my Skool community page. I have my Pixel ID and I have pasted it into [WHERE YOU PASTED IT]. I need to verify it is working correctly. Walk me through the step-by-step process of: 1) Installing the Meta Pixel Helper Chrome extension, 2) Verifying the pixel is firing on my page, 3) Setting up a custom conversion event for new community signups, and 4) Troubleshooting common issues if the pixel is not showing as active. Explain everything in simple terms.", "fields": ["WHERE YOU PASTED IT"], "hints": {"WHERE YOU PASTED IT": ""}}, {"title": "Ad Copy Variations", "prompt": "Write 6 different Facebook ad copy variations for my free Skool community about [YOUR NICHE]. My target audience is [DESCRIBE THEM]. My community helps people [SPECIFIC RESULT]. My proof points include [YOUR NUMBERS AND RESULTS]. For each variation, write: 1) A scroll-stopping hook as the first line, 2) Two to three sentences of body copy that build interest and credibility, 3) A clear call to action to join the free community. Make each variation use a different angle: one based on a bold claim, one based on a question, one based on a pain point, one based on a success story, one based on urgency, and one based on curiosity. Keep each ad under 125 words total for best performance in the feed.", "fields": ["YOUR NICHE", "DESCRIBE THEM", "SPECIFIC RESULT", "YOUR NUMBERS AND RESULTS"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "DESCRIBE THEM": "", "SPECIFIC RESULT": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "YOUR NUMBERS AND RESULTS": "e.g. earn $2,000/month from their passion, get their first 100 sales..."}}, {"title": "Hook Lines Only", "prompt": "Generate 20 scroll-stopping hook lines for Facebook ads promoting a free community about [YOUR NICHE]. My audience is [WHO THEY ARE]. The hooks should make someone stop scrolling and read the rest of the ad. Use a mix of: bold statements, provocative questions, surprising numbers, contrarian takes, and direct challenges. Each hook should be one sentence, maximum 15 words. These need to feel urgent and personal.", "fields": ["YOUR NICHE", "WHO THEY ARE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Ad Headlines and Descriptions", "prompt": "Generate 6 pairs of Facebook ad headlines and descriptions for my free Skool community. My community teaches [YOUR NICHE] to [AUDIENCE]. Headlines should be under 40 characters and create urgency or curiosity. Descriptions should be under 30 characters and reinforce the free, no-risk nature of joining. Make each pair different in angle: one about results, one about community, one about free access, one about transformation, one about proof, and one about urgency.", "fields": ["YOUR NICHE", "AUDIENCE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Analyzing Ad Performance", "prompt": "Here are the results from my Meta Ads campaign after 5 days. Campaign budget: $33/day. Total spent: $165. I ran 6 ad variations. Here are the stats for each ad: [LIST EACH AD WITH ITS: cost per lead, CTR, CPC, impressions, and number of results]. Based on this data: 1) Which ads are winners and should keep running? 2) Which ads should I kill? 3) What patterns do you see in the winning ads vs. the losing ads? 4) What specific changes should I make for my next round of testing? 5) What should I adjust in my targeting or budget?", "fields": [], "hints": {}}, {"title": "New Ad Variations Based on Winners", "prompt": "My best-performing Facebook ads had these characteristics: [DESCRIBE THE WINNING ADS — what type of image, what hook style, what copy angle, what CTA]. Create 3 new ad copy variations that follow the same patterns but are different enough to avoid ad fatigue. Keep the same angle and tone that worked, but change the specific words, the hook, and the examples. Also suggest 3 new image concepts that match the style of my winning creatives.", "fields": [], "hints": {}}, {"title": "Retargeting Ad Copy", "prompt": "Write 4 retargeting ad copy variations for people who visited my Skool community page but did not join. My community teaches [YOUR NICHE] to [AUDIENCE]. The copy should acknowledge that they have seen my community before without being creepy. Use angles like: 1) Social proof (how many members are already inside), 2) Highlighting what they are missing, 3) Addressing common objections or hesitations, 4) Creating urgency or FOMO. Keep each ad under 100 words. The CTA should be to join the free community.", "fields": ["YOUR NICHE", "AUDIENCE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Ad ROI Calculator", "prompt": "Help me calculate the return on investment for my Meta Ads. Here are my numbers: Daily ad budget: $[AMOUNT]. Average cost per lead: $[AMOUNT]. My paid community costs $[AMOUNT]/month. My average free-to-paid conversion rate is [PERCENTAGE OR ESTIMATE]. My average member retention is [MONTHS]. Based on these numbers, calculate: 1) How many free members I get per month, 2) How many convert to paid per month, 3) My monthly revenue from new paid members, 4) My total revenue over 6 months including retention, 5) My overall ROI on ad spend. Also tell me what cost per lead I need to hit to break even.", "fields": ["AMOUNT", "PERCENTAGE OR ESTIMATE", "MONTHS"], "hints": {"AMOUNT": "e.g. 47, 77, 97...", "PERCENTAGE OR ESTIMATE": "", "MONTHS": ""}}]}, "5": {"name": "Email Campaigns", "icon": "📧", "prompts": [{"title": "Email Strategy Overview", "prompt": "I am building an email marketing system for my online community business about [YOUR NICHE]. My funnel is: YouTube and Meta Ads drive people to my free Skool community, where I capture their email through a questionnaire. I then nurture them with an automated email sequence in Mailchimp. My goal is to convert free members to my paid community at $[PRICE]/month. Help me map out: 1) What information I should capture in my questionnaire, 2) How long my nurture sequence should be, 3) What types of emails convert best for community businesses, 4) What conversion rate I should realistically expect from email, and 5) Key metrics I should track.", "fields": ["YOUR NICHE", "PRICE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "PRICE": "e.g. 47, 77, 97..."}}, {"title": "Questionnaire Questions", "prompt": "I am setting up a questionnaire for my free Skool community about [YOUR NICHE]. New members must complete it before gaining access. I need 3 to 4 questions that: 1) Capture their email address (required), 2) Help me understand their goals or challenges, 3) Tell me how they found my community, and 4) Are quick and easy to answer so people do not abandon the signup. Write the questions in a friendly, conversational tone that makes people feel welcome, not interrogated. Also suggest the best answer format for each (open text, multiple choice, etc.).", "fields": ["YOUR NICHE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}, {"title": "Zapier Setup Help", "prompt": "I am connecting my Skool community to Mailchimp through Zapier. I have enabled the Zapier plugin in Skool and copied my API key. I am now inside Zapier creating a new Zap. Walk me through every step in detail: 1) How to set up the Skool trigger for new community members, 2) How to connect my API key, 3) How to set up the Mailchimp action to add subscribers, 4) How to map the email field from Skool to Mailchimp, 5) How to add a tag called 'Free Community' to every subscriber, and 6) How to test everything to make sure it works. If something goes wrong, give me the most common fixes.", "fields": [], "hints": {}}, {"title": "Welcome Email", "prompt": "Write a welcome email for new members of my free community about [YOUR NICHE]. This is the first email they receive after joining. The tone should be warm, personal, and direct, like I am writing to a friend who just joined. Include: 1) A thank you for joining, 2) A brief reminder of what the community is about and what they can expect, 3) One specific action they should take right now inside the community (like introduce themselves or start a specific lesson), 4) A quick teaser about the value they will get from being here, and 5) A sign-off that feels personal, not corporate. Keep it under 250 words. No hard selling in this email.", "fields": ["YOUR NICHE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}, {"title": "Paid Member Welcome Email", "prompt": "Write a welcome email for someone who just upgraded to my paid community. My community teaches [YOUR NICHE] at $[PRICE]/month. The tone should be celebratory, supportive, and action-oriented. Include: 1) Congratulations on investing in themselves, 2) What they now have access to that free members do not, 3) The first three things they should do right now, 4) How to reach me for support or questions, and 5) A motivating close that gets them excited to start. Keep it under 300 words.", "fields": ["YOUR NICHE", "PRICE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "PRICE": "e.g. 47, 77, 97..."}}, {"title": "Segment Strategy", "prompt": "I have two tags in my Mailchimp email list: 'Free Community' for free Skool members and 'Paid Member' for paid members. Help me create a complete email segmentation strategy. For each segment (free-only, paid-only, all members), tell me: 1) What types of emails they should receive, 2) How often they should be emailed, 3) What content or CTAs are appropriate, and 4) Any emails they should NEVER receive. Also suggest any additional tags I should create for more advanced segmentation as my list grows.", "fields": [], "hints": {}}, {"title": "Complete 14-Day Email Sequence", "prompt": "Write a 7-email nurture sequence for my free Skool community members. Emails go out every other day over 14 days. My community teaches [YOUR NICHE] to [AUDIENCE]. My paid community costs $[PRICE]/month and includes [WHAT PAID MEMBERS GET]. For each email, write: 1) A compelling subject line that gets opened, 2) The full email body copy, and 3) A specific call to action. Follow this structure: Email 1 (Day 1) — Welcome, Email 2 (Day 3) — Value bomb with useful tip, Email 3 (Day 5) — My personal story, Email 4 (Day 7) — Social proof or member win, Email 5 (Day 9) — Free content highlight, Email 6 (Day 11) — Soft sell revealing what paid members get, Email 7 (Day 13) — Direct invitation to upgrade. Keep each email under 300 words. Tone: personal, direct, conversational. The sequence should feel like messages from a mentor, not a marketing machine.", "fields": ["YOUR NICHE", "AUDIENCE", "PRICE", "WHAT PAID MEMBERS GET"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "PRICE": "e.g. 47, 77, 97...", "WHAT PAID MEMBERS GET": ""}}, {"title": "Subject Lines for Each Email", "prompt": "Generate 3 subject line options for each email in my 7-email nurture sequence. The emails cover: Day 1 Welcome, Day 3 Value tip, Day 5 Personal story, Day 7 Member win, Day 9 Free content, Day 11 Soft sell, Day 13 Direct invite. Each subject line should be under 50 characters, create curiosity, and match the email's purpose. Do not use spammy language. Make them feel like a message from a friend, not a brand.", "fields": [], "hints": {}}, {"title": "Email Performance Analysis", "prompt": "Here are the stats from my 7-email nurture sequence after running for [TIME PERIOD] with [NUMBER] subscribers: Email 1 — Open Rate: [X]%, Click Rate: [X]%. Email 2 — Open Rate: [X]%, Click Rate: [X]%. [LIST ALL 7]. My paid community conversion from this sequence is [X]%. Analyze these numbers and tell me: 1) Which emails are performing well and why, 2) Which emails are underperforming and what specific changes I should make, 3) Whether my overall sequence is healthy compared to industry benchmarks, and 4) Three specific tests I should run to improve my conversion rate.", "fields": ["TIME PERIOD", "NUMBER"], "hints": {"TIME PERIOD": "", "NUMBER": "Enter a number"}}, {"title": "Weekly Broadcast Email Template", "prompt": "Write a template for a weekly email broadcast I can send to my community email list. My community is about [YOUR NICHE]. The template should include: 1) A personal greeting, 2) A section for this week's new content (YouTube video, lesson, or post), 3) A section for a member win or community highlight, 4) A quick tip or insight, and 5) A CTA to engage in the community. This template should be flexible so I can swap in new content each week. Keep it under 250 words and make the tone personal and energetic.", "fields": ["YOUR NICHE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}, {"title": "Re-engagement Email", "prompt": "Write a re-engagement email for subscribers who have not opened my emails in 60 days. My community is about [YOUR NICHE]. The email should: 1) Acknowledge they have been quiet, 2) Remind them why they joined and what they are missing, 3) Offer one compelling reason to come back (a new resource, a result, or an opportunity), and 4) Ask them to click a link if they want to stay subscribed. If they do not engage, I will remove them from my active list. Keep it under 200 words. Tone: warm, not guilt-tripping.", "fields": ["YOUR NICHE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling..."}}]}, "6": {"name": "Building Offers", "icon": "💰", "prompts": [{"title": "Defining Your Offer", "prompt": "I am building a paid online community about [YOUR NICHE] for [YOUR AUDIENCE]. My experience and credibility include [YOUR BACKGROUND AND PROOF POINTS]. Help me define my offer by answering: 1) What specific transformation or result does someone get from my paid community? 2) What are the 5-8 core modules I should build in my classroom? 3) What types of content should I include (video lessons, templates, live calls, etc.)? 4) What makes this offer different from other communities in my niche? 5) What should I name my paid community? Give me a name that communicates exclusivity and results.", "fields": ["YOUR NICHE", "YOUR AUDIENCE", "YOUR BACKGROUND AND PROOF POINTS"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "YOUR AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "YOUR BACKGROUND AND PROOF POINTS": "e.g. 10 years in retail management, sold 500+ items on Etsy..."}}, {"title": "Complete Module Build", "prompt": "I need to build a complete course module for my paid community about [YOUR NICHE]. The module topic is [MODULE TOPIC]. My audience is [WHO THEY ARE] and the outcome of this module is [WHAT THEY WILL BE ABLE TO DO AFTER COMPLETING IT]. Create: 1) A module description that I can post at the top, 2) Five to six lesson titles with a one-sentence description of each, 3) A full written lesson for the first lesson including the concept, step-by-step breakdown, an example, an AI prompt they can use, and an action step, and 4) A list of any templates or resources I should include. Write in a direct coaching tone.", "fields": ["YOUR NICHE", "MODULE TOPIC", "WHO THEY ARE", "WHAT THEY WILL BE ABLE TO DO AFTER COMPLETING IT"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "MODULE TOPIC": "Describe the specific topic...", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "WHAT THEY WILL BE ABLE TO DO AFTER COMPLETING IT": ""}}, {"title": "Video Lesson Script", "prompt": "Write a video lesson script for my paid community course. The lesson is [LESSON TITLE] inside the module [MODULE NAME]. My audience is [WHO THEY ARE]. The script should be 5 to 8 minutes when read at a natural pace. Include: 1) A hook in the first 10 seconds that tells them why this lesson matters, 2) The main concept explained simply, 3) A step-by-step walkthrough they can follow, 4) A personal story or example from my experience, 5) An AI prompt they can use to apply this to their business, and 6) A specific action step. Write it conversationally, like I am coaching them one-on-one.", "fields": ["LESSON TITLE", "MODULE NAME", "WHO THEY ARE"], "hints": {"LESSON TITLE": "Enter the title", "MODULE NAME": "Your name or brand name", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Free Community Content Plan", "prompt": "I have a paid community about [YOUR NICHE] with the following modules: [LIST YOUR MODULE NAMES]. I need to create a free community that gives people a taste of the paid content and funnels them to upgrade. Help me decide: 1) Which specific lessons from my paid community should I offer for free? 2) What additional free-only content should I create? 3) How should I organize the free classroom to naturally lead people toward wanting the paid tier? 4) What posts should I make in the free community feed to showcase paid member wins? 5) How often should I mention the paid community without being pushy? Give me a complete content plan for the free community.", "fields": ["YOUR NICHE", "LIST YOUR MODULE NAMES"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "LIST YOUR MODULE NAMES": "Your name or brand name"}}, {"title": "Pricing Strategy", "prompt": "Help me create a pricing strategy for my paid community about [YOUR NICHE]. My target audience is [DESCRIBE THEM AND THEIR INCOME LEVEL]. The result I help them achieve is [SPECIFIC OUTCOME]. I currently have [NUMBER] of paid members and [NUMBER] of free members. I want to start with a lower price and increase it every 2-3 months as I build social proof. Suggest: 1) My launch price and why, 2) My second-tier price and when to increase, 3) My established price, 4) Whether I should offer annual pricing and at what discount, 5) When I should consider adding a VIP tier, and 6) How to announce price increases to create urgency without being salesy.", "fields": ["YOUR NICHE", "DESCRIBE THEM AND THEIR INCOME LEVEL", "SPECIFIC OUTCOME", "NUMBER"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "DESCRIBE THEM AND THEIR INCOME LEVEL": "", "SPECIFIC OUTCOME": "e.g. earn $2,000/month from their passion, get their first 100 sales...", "NUMBER": "Enter a number"}}, {"title": "Price Increase Announcement", "prompt": "Write an announcement post for my free Skool community about a price increase on my paid community. The current price is $[CURRENT] per month. The new price will be $[NEW] per month starting on [DATE]. I want to: 1) Explain why the price is going up (more content, more results, more value), 2) Share a quick success story or proof point, 3) Offer the current price as a lock-in for anyone who joins before the deadline, and 4) End with a clear CTA to upgrade. Keep it under 200 words. Tone: confident and fair, not pushy or desperate.", "fields": ["CURRENT", "NEW", "DATE"], "hints": {"CURRENT": "", "NEW": "", "DATE": ""}}, {"title": "Social Proof Strategy", "prompt": "I need to build social proof for my online community about [YOUR NICHE]. I currently have [NUMBER] paid members and [NUMBER] free members. Help me create a systematic social proof strategy: 1) Five specific prompts I can post weekly to encourage members to share wins, 2) A template DM I can send to members asking for testimonials, 3) How to format and display testimonials on my community page and in my ads, 4) A plan for creating three case study posts featuring member success stories, and 5) How to use social proof in my email sequences without it feeling forced.", "fields": ["YOUR NICHE", "NUMBER"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "NUMBER": "Enter a number"}}, {"title": "Discovering Your Offer", "prompt": "I want to build a paid online community but I am not sure exactly how to package my offer. Here is what I know and am experienced in: [LIST EVERYTHING YOU KNOW HOW TO DO, EVERY SKILL, EVERY EXPERIENCE, EVEN IF IT SEEMS SMALL]. The types of people I want to help are [DESCRIBE YOUR IDEAL AUDIENCE]. The problems they face are [WHAT THEY STRUGGLE WITH]. Help me discover my offer by: 1) Identifying the top 3 offers I could build based on my skills and their needs, 2) For each offer, tell me what modules to include, what the transformation is, and what to charge, 3) Tell me which offer has the highest earning potential and the least competition, and 4) Write a one-paragraph description of my best offer that I could post on my community page today.", "fields": ["LIST EVERYTHING YOU KNOW HOW TO DO, EVERY SKILL, EVERY EXPERIENCE, EVEN IF IT SEEMS SMALL", "DESCRIBE YOUR IDEAL AUDIENCE", "WHAT THEY STRUGGLE WITH"], "hints": {"LIST EVERYTHING YOU KNOW HOW TO DO, EVERY SKILL, EVERY EXPERIENCE, EVEN IF IT SEEMS SMALL": "e.g. 10 years in retail management, sold 500+ items on Etsy...", "DESCRIBE YOUR IDEAL AUDIENCE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "WHAT THEY STRUGGLE WITH": ""}}, {"title": "Packaging Your Knowledge", "prompt": "I have experience in [YOUR AREA OF EXPERTISE]. Here is everything I can teach someone about this topic: [LIST EVERY SKILL, PROCESS, STRATEGY, AND PIECE OF KNOWLEDGE YOU HAVE, EVEN BASICS]. Organize this knowledge into a structured course with modules and lessons. Group related topics together. Put them in the order someone should learn them. Identify any gaps where I might be missing important topics. Then write a one-sentence promise for the complete course: what will someone be able to do after they finish it?", "fields": ["YOUR AREA OF EXPERTISE", "LIST EVERY SKILL, PROCESS, STRATEGY, AND PIECE OF KNOWLEDGE YOU HAVE, EVEN BASICS"], "hints": {"YOUR AREA OF EXPERTISE": "", "LIST EVERY SKILL, PROCESS, STRATEGY, AND PIECE OF KNOWLEDGE YOU HAVE, EVEN BASICS": ""}}, {"title": "Offer Audit", "prompt": "I am doing a quarterly review of my paid community offer. Here is my current classroom structure: [LIST YOUR MODULES AND LESSONS]. Here are the most common questions my members have been asking: [LIST THEM]. Here are the topics members have requested that I do not currently cover: [LIST THEM]. Based on this, help me: 1) Identify which modules are strong and should stay as-is, 2) Identify which lessons need updating or expanding, 3) Suggest 2-3 new modules or lessons I should add, 4) Recommend anything I should remove or merge, and 5) Suggest how to position these updates as a reason for a price increase.", "fields": ["LIST YOUR MODULES AND LESSONS", "LIST THEM"], "hints": {"LIST YOUR MODULES AND LESSONS": "", "LIST THEM": ""}}, {"title": "Scaling Your Offer", "prompt": "My paid community about [YOUR NICHE] currently has [NUMBER] members at $[PRICE]/month. I am ready to scale my offer. Help me plan: 1) A VIP tier — what to include, how to price it, and how many spots to offer, 2) An annual plan — what discount to give and how to position it, 3) A potential cohort-based program — what topic, what length, and what price, 4) How to present these options on my community page without overwhelming people, and 5) An email and social media announcement strategy for launching the new tiers.", "fields": ["YOUR NICHE", "NUMBER", "PRICE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "NUMBER": "Enter a number", "PRICE": "e.g. 47, 77, 97..."}}]}, "7": {"name": "Affiliate Marketing", "icon": "🤝", "prompts": [{"title": "Personalized Affiliate Message", "prompt": "I am an affiliate for an online business coaching community called the Corbellic Blueprint. The community teaches people how to take their passions and skills and turn them into income using AI, YouTube, Skool communities, and online marketing. The paid membership is $77/month and includes full courses, coaching, and a proven system. Help me write 3 different messages I can send to people I know to share my affiliate link: 1) A message for a close friend who I think would benefit from this, 2) A message for someone on social media who has expressed interest in making money online, and 3) A post I can share on my Facebook, Instagram, or X profile. Each should be genuine, not salesy, and explain why I personally am in this community and what it has done for me. Keep each under 100 words.", "fields": [], "hints": {}}, {"title": "Social Media Affiliate Posts", "prompt": "Write 5 social media posts I can use to share my affiliate link for the Corbellic Blueprint community. The community teaches people how to turn their passions and skills into income using AI, YouTube, and online communities. Each post should: 1) Share something I am learning or building (make it feel like a personal update, not an ad), 2) Naturally mention the community as the reason for my progress, 3) Include a soft call to action to check it out, and 4) Be under 100 words. Write them for different platforms: one for Facebook, one for Instagram, one for X/Twitter, one for LinkedIn, and one for a TikTok caption.", "fields": [], "hints": {}}, {"title": "Affiliate Content Ideas", "prompt": "I am an affiliate for an online business community and I want to create content that naturally promotes my affiliate link without being pushy. Give me 10 content ideas I can post on social media over the next two weeks. Each idea should provide genuine value to my audience (tips, insights, or motivation about building an online business) while naturally leading to a mention of the community. For each idea, give me: 1) The topic, 2) A one-sentence hook, and 3) How to naturally work in the affiliate mention.", "fields": [], "hints": {}}, {"title": "Affiliate Program Announcement", "prompt": "Write an announcement post for my Skool community introducing our new affiliate program. My community teaches [YOUR NICHE] and the membership costs $[PRICE]/month. Affiliates earn [PERCENTAGE]% of every referral, every month, for as long as the member stays subscribed. The post should: 1) Explain what the affiliate program is and how it works, 2) Show the math of how much they can earn (use specific numbers), 3) Walk them through how to get their affiliate link, 4) Give them 3 easy ways to share it today, and 5) End with excitement and encouragement. Keep it under 300 words. Make it feel like an opportunity, not a pitch.", "fields": ["YOUR NICHE", "PRICE", "PERCENTAGE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "PRICE": "e.g. 47, 77, 97...", "PERCENTAGE": ""}}, {"title": "Shareable Affiliate Resources for Members", "prompt": "I have an affiliate program for my paid community about [YOUR NICHE] at $[PRICE]/month with [PERCENTAGE]% commission. I want to give my affiliate members ready-to-use resources so they can promote easily. Create: 1) Three copy-paste DM templates they can send to friends, 2) Three social media post templates they can customize, 3) Five talking points they can use when someone asks about the community, and 4) A simple one-paragraph description of the community they can share anywhere. Make everything sound authentic and personal, not corporate.", "fields": ["YOUR NICHE", "PRICE", "PERCENTAGE"], "hints": {"YOUR NICHE": "e.g. fitness coaching, candle making, eBay reselling...", "PRICE": "e.g. 47, 77, 97...", "PERCENTAGE": ""}}]}, "8": {"name": "Find Your Why", "icon": "🧭", "prompts": [{"title": "Discovering Your Genius", "prompt": "I want to discover what I am genuinely good at so I can build a business around it. Here is everything about me: My professional experience includes [LIST ALL JOBS, ROLES, AND WORK EXPERIENCE]. My hobbies and interests include [LIST EVERYTHING YOU DO FOR FUN OR SPEND TIME ON]. Skills people have complimented me on or come to me for help with include [LIST THEM]. Things I could talk about for hours without getting bored include [LIST THEM]. Challenges I have overcome in my life include [LIST THEM]. Based on all of this, help me identify: 1) My top 3 natural genius areas where I have the most knowledge and passion, 2) For each one, who would pay to learn from me and what problem I would solve for them, 3) Which one has the best combination of passion, expertise, and market demand, and 4) A one-sentence description of the business I could build around my top genius area.", "fields": ["LIST ALL JOBS, ROLES, AND WORK EXPERIENCE", "LIST EVERYTHING YOU DO FOR FUN OR SPEND TIME ON", "LIST THEM"], "hints": {"LIST ALL JOBS, ROLES, AND WORK EXPERIENCE": "e.g. 10 years in retail management, sold 500+ items on Etsy...", "LIST EVERYTHING YOU DO FOR FUN OR SPEND TIME ON": "", "LIST THEM": ""}}, {"title": "Discovering Your Why", "prompt": "I want to identify my deep 'why' for building an online business. Help me discover it by asking me reflective questions and then synthesizing my answers into a clear why statement. Here is what I know about myself: The life I want to live looks like [DESCRIBE YOUR IDEAL LIFE]. The people I care most about are [WHO]. The experiences that shaped me most include [DESCRIBE PIVOTAL MOMENTS]. What frustrates me about the world is [WHAT]. If I could help one person with one thing, it would be [WHAT]. The legacy I want to leave is [WHAT]. Based on all of this, write me a why statement in one to two sentences that I can read every morning to remind myself why I am doing this. Make it emotional, personal, and powerful.", "fields": ["DESCRIBE YOUR IDEAL LIFE", "WHO", "DESCRIBE PIVOTAL MOMENTS", "WHAT"], "hints": {"DESCRIBE YOUR IDEAL LIFE": "", "WHO": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "DESCRIBE PIVOTAL MOMENTS": "", "WHAT": ""}}, {"title": "Connecting Your Why to Your Business", "prompt": "My passion is [YOUR PASSION] and my why is [YOUR WHY STATEMENT FROM ABOVE]. Help me connect these two things into a clear business mission. Show me: 1) How my passion naturally serves my why, 2) Who specifically benefits when I combine my passion and my why, 3) How to communicate this mission on my community page, my YouTube channel, and my social media so people immediately understand what I stand for, and 4) A one-paragraph mission statement I can use across all my platforms.", "fields": ["YOUR PASSION", "YOUR WHY STATEMENT FROM ABOVE"], "hints": {"YOUR PASSION": "e.g. woodworking, cooking, personal finance, dog training...", "YOUR WHY STATEMENT FROM ABOVE": "Your deeper reason for building this business..."}}, {"title": "Deep Passion Discovery", "prompt": "I am trying to figure out what I am passionate about so I can build a business around it. I am going to share some things about myself and I want you to help me discover patterns I might not see. Here goes: When I was a kid, I loved [WHAT DID YOU LOVE DOING AS A CHILD]. The activities that make me lose track of time today are [LIST THEM]. Topics I find myself reading about or watching videos about without anyone telling me to include [LIST THEM]. If money was not a factor and I could do anything every day, I would [WHAT]. The compliments I receive most often are about [WHAT]. Things I find easy that other people seem to struggle with include [LIST THEM]. Jobs or projects I have enjoyed most in my life include [LIST THEM]. Things that make me angry or frustrated about the world include [WHAT]. Based on all of this, identify: 1) Patterns you see across my answers, 2) Three potential passions I might not have consciously recognized, 3) For each one, how it could become a business that serves other people, and 4) The one you think is the strongest match based on the combination of my energy, my skills, and market demand.", "fields": ["WHAT DID YOU LOVE DOING AS A CHILD", "LIST THEM", "WHAT"], "hints": {"WHAT DID YOU LOVE DOING AS A CHILD": "", "LIST THEM": "", "WHAT": ""}}, {"title": "Validating Your Passion", "prompt": "I am considering building an online business around [YOUR PASSION]. Before I commit, I need to validate that there is a real market for this. Help me validate by: 1) Showing me what people are searching for on YouTube and Google related to this topic (suggest 10 search terms I can check), 2) Identifying existing communities, courses, or creators in this space and how they are doing, 3) Estimating the size of the potential audience, 4) Identifying specific problems people in this niche have that I could solve, 5) Suggesting what a paid community or course could look like in this niche, and 6) Being honest with me — is this a viable business or do I need to adjust my angle? If it needs adjusting, suggest how.", "fields": ["YOUR PASSION"], "hints": {"YOUR PASSION": "e.g. woodworking, cooking, personal finance, dog training..."}}, {"title": "Defining Your Tribe", "prompt": "I am building a business around [YOUR PASSION]. Help me get crystal clear on who my tribe is. I need to know: 1) The demographics — age range, gender split, income level, life stage, 2) The psychographics — what they value, what they fear, what they dream about, what keeps them up at night, 3) Where they hang out online — which platforms, which groups, which communities, which YouTube channels do they already follow, 4) What they have already tried that has not worked for them, 5) What specific words and phrases they use to describe their problem (this is important for marketing), and 6) The single most important thing they want that I can help them with. Give me a vivid, detailed portrait of one specific person in my tribe so I can picture them when I create content.", "fields": ["YOUR PASSION"], "hints": {"YOUR PASSION": "e.g. woodworking, cooking, personal finance, dog training..."}}, {"title": "Your 7-Day Quick Start Plan", "prompt": "My passion is [YOUR PASSION] and I want to start putting it out there this week. I do not need everything to be perfect. I need a simple plan to take action. Create a 7-day quick start plan for me: Day 1 through Day 7, one specific action per day that moves me forward. Include: setting up my social media presence, creating my first piece of content, posting it publicly, starting to talk about my passion online, and getting my first feedback from real people. Keep it simple and doable. I want zero excuses and maximum action.", "fields": ["YOUR PASSION"], "hints": {"YOUR PASSION": "e.g. woodworking, cooking, personal finance, dog training..."}}, {"title": "Your Personal Declaration", "prompt": "Help me write a personal declaration of commitment to building my online business. My passion is [YOUR PASSION]. My why is [YOUR WHY]. My tribe is [WHO YOU SERVE]. This declaration should: 1) State clearly what I am building and why, 2) Acknowledge that it will be hard and that I am doing it anyway, 3) Commit to showing up every day regardless of how I feel, 4) Express the impact I want to have on other people's lives, and 5) End with a powerful closing statement that I can read every morning. Make it emotional, direct, and written in first person. This is my personal manifesto.", "fields": ["YOUR PASSION", "YOUR WHY", "WHO YOU SERVE"], "hints": {"YOUR PASSION": "e.g. woodworking, cooking, personal finance, dog training...", "YOUR WHY": "Your deeper reason for building this business...", "WHO YOU SERVE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income..."}}, {"title": "Connecting Everything to the Blueprint", "prompt": "I have discovered my passion, my why, and my tribe. Now I need to map out how everything in this Blueprint course applies to my specific business. My passion is [YOUR PASSION]. My tribe is [WHO THEY ARE]. My paid community will teach [WHAT]. Walk me through how to apply each step of the Blueprint to my business: 1) How to set up my Skool community for this niche, 2) What tools and software I specifically need, 3) What my first 10 YouTube video topics should be, 4) How to run Meta Ads for this audience, 5) What my email nurture sequence should focus on, 6) How to structure my free and paid offers, and 7) How to use the affiliate program. Give me a personalized implementation roadmap.", "fields": ["YOUR PASSION", "WHO THEY ARE", "WHAT"], "hints": {"YOUR PASSION": "e.g. woodworking, cooking, personal finance, dog training...", "WHO THEY ARE": "e.g. stay-at-home moms aged 30-50, retirees looking for side income...", "WHAT": ""}}]}, "9": {"name": "14-Day Orientation", "icon": "🚀", "prompts": [{"title": "DAY 1 AI PROMPT", "prompt": "Today is Day 1 of my business journey. I just discovered that my passion is [YOUR PASSION] and my why is [YOUR WHY]. Help me write a powerful introduction post for my new community. Include who I am, what I am passionate about, why I am here, and what I am committed to building. Make it personal and genuine. Under 150 words.", "fields": ["YOUR PASSION", "YOUR WHY"], "hints": {"YOUR PASSION": "e.g. woodworking, cooking, personal finance, dog training...", "YOUR WHY": "Your deeper reason for building this business..."}}, {"title": "DAY 14 AI PROMPT — Your Graduation Post", "prompt": "I just completed the 14-Day Orientation in the Corbellic Blueprint. Help me write a powerful graduation post for the community. Include: 1) What I have built in the last 14 days (my passion, my community, my YouTube channel, my content, my email system), 2) What I learned about myself during this process, 3) My commitment going forward, and 4) Encouragement for anyone who is just starting Day 1. Make it personal, motivating, and real. Under 250 words.", "fields": [], "hints": {}}]}};

function bSb(){
  const s=document.getElementById('sb');

  for(const[n,m]of Object.entries(M)){
    h+=`<div class="mg"><div class="mh" onclick="tMod(${n})" id="mh${n}"><span class="ic">${m.icon}</span><span>M${n}: ${m.name}</span><span class="ar">▶</span></div><div class="mp" id="mp${n}">`;
