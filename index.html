  s.innerHTML=h;
}

function tMod(n){
  const el=document.getElementById('mp'+n),hd=document.getElementById('mh'+n),o=el.classList.contains('op');
  document.querySelectorAll('.mp').forEach(e=>e.classList.remove('op'));
  document.querySelectorAll('.mh').forEach(e=>e.classList.remove('act'));
  if(!o){el.classList.add('op');hd.classList.add('act')}
}

function tSb(){
  document.getElementById('sb').classList.toggle('open');
  document.getElementById('ov').classList.toggle('sh');
}

function sel(mn,idx){
  cMod=mn;cIdx=idx;res='';
  document.querySelectorAll('.pb').forEach(e=>e.classList.remove('act'));
  const b=document.getElementById('pb'+mn+'_'+idx);
  if(b)b.classList.add('act');
  if(window.innerWidth<=768)tSb();
  rTool();
}

function rTool(){
  const m=M[cMod],p=m.prompts[cIdx],mn=document.getElementById('mn');
  let h=`<div class="ts"><div class="bc">Module ${cMod}: ${m.name}</div><h1 class="tt">${p.title}</h1>`;
  
  if(p.fields.length===0){
    h+=`<div class="nf"><p>This prompt is ready to go — no custom fields needed. Click the button below and AI will generate your result.</p><div class="pp">${p.prompt}</div></div><div class="br"><button class="bp" onclick="run()">Generate with AI →</button></div>`;
  }else{
    p.fields.forEach((f,i)=>{
      const hint=p.hints&&p.hints[f]?p.hints[f]:'';
      const nice=f.replace(/LIST /g,'List ').replace(/DESCRIBE /g,'Describe ').replace(/YOUR /g,'Your ').replace(/SHARE /g,'Share ');
      h+=`<div class="fg"><div class="fl">${nice}</div>`;
      if(hint)h+=`<div class="fh">${hint}</div>`;
      h+=`<textarea class="fi2" id="f${i}" placeholder="Type your answer here..." rows="3"></textarea></div>`;
    });
    h+=`<div class="br"><button class="bp" id="goBtn" onclick="run()">Generate with AI →</button></div>`;
  }
  h+='</div>';
  mn.innerHTML=h;
  const first=document.getElementById('f0');
  if(first)setTimeout(()=>first.focus(),200);
}

async function run(){
  const m=M[cMod],p=m.prompts[cIdx];
  let prompt=p.prompt;
  
  // Fill in fields
  p.fields.forEach((f,i)=>{
    const el=document.getElementById('f'+i);
    const val=el?el.value.trim():'';
    prompt=prompt.split('['+f+']').join(val||'[not provided]');
  });
  
  const mn=document.getElementById('mn');
  mn.innerHTML=`<div class="ts"><div class="lw"><div class="spin"></div><p style="font-size:18px;margin-bottom:8px;font-family:'Playfair Display',serif">Generating your personalized result<span class="pls">...</span></p><p style="font-size:14px;color:var(--dim)">AI is analyzing everything you shared.</p></div></div>`;
  
  try{
    const r=await fetch('/.netlify/functions/ai',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:prompt})
    });
    if(!r.ok){
      const errText=await r.text();
      console.error('Function error:',r.status,errText);
      res='Error connecting to AI (status '+r.status+'). Make sure your ANTHROPIC_API_KEY is set in Netlify environment variables and redeploy the site.';
      rResult();return;
    }
    const d=await r.json();
    if(d.error){
      res='API Error: '+(d.error.message||JSON.stringify(d.error));
      rResult();return;
    }
    if(!d.content||!Array.isArray(d.content)){
      res='Unexpected response from AI. Please try again.';
      rResult();return;
    }
    res=d.content.map(c=>c.text||'').filter(Boolean).join('\n');
  }catch(e){
    console.error(e);
    res='Something went wrong: '+e.message+'. Please try again.';
  }
  
  rResult();
}

function rResult(){
  const m=M[cMod],p=m.prompts[cIdx],mn=document.getElementById('mn');
  // Simple markdown-ish formatting
  let fmt=res.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'\n');
  
  mn.innerHTML=`<div class="ts">
    <div class="bc">Module ${cMod}: ${m.name}</div>
    <h1 class="tt">${p.title} — Your Results</h1>
    <div class="rc"><div class="rt">${fmt}</div>
      <div class="btns">
        <button class="cb2" onclick="copyRes()">Copy to Clipboard</button>
        <button class="cb2" onclick="sel(cMod,cIdx)">Run Again</button>
      </div>
    </div>
    <div class="br"><button class="cb2" onclick="showWelcome()">← Back to Tools</button></div>
  </div>`;
}

function copyRes(){
  navigator.clipboard.writeText(res).then(()=>{
    const btns=document.querySelectorAll('.cb2');
    if(btns[0]){btns[0].textContent='Copied!';setTimeout(()=>btns[0].textContent='Copy to Clipboard',2000)}
  });
}

function showWelcome(){
  cMod=null;cIdx=null;
  document.querySelectorAll('.pb').forEach(e=>e.classList.remove('act'));
  const mn=document.getElementById('mn');
  mn.innerHTML=`<div class="wl">
    <div style="font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);border:1px solid var(--ab);display:inline-block;padding:6px 18px;border-radius:2px;margin-bottom:24px;font-weight:700">Blueprint AI Tools</div>
    <h1>Your Personal AI Business Coach</h1>
    <p>Select any tool from the sidebar to get started. Answer the questions, click generate, and AI will give you a personalized result for your business.</p>
    <div class="sr">
      <div class="st"><div class="n">9</div><div class="l">Modules</div></div>
      <div class="st"><div class="n">94</div><div class="l">AI Tools</div></div>
      <div class="st"><div class="n">∞</div><div class="l">Possibilities</div></div>
    </div>
  </div>`;
}

bSb();
showWelcome();
</script>
</body>
</html>
